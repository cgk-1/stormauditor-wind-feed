name: anl-bg-backfill-newdb
on:
  schedule:
    - cron: "10 1,5,9,13,17,21 * * *"
  workflow_dispatch:
    inputs:
      time_budget_min: {description: "minutes", default: "100"}
jobs:
  walk:
    runs-on: ubuntu-latest
    timeout-minutes: 115
    concurrency: {group: newdb-anl-bg-backfill, cancel-in-progress: false}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: sudo apt-get update -q && sudo apt-get install -y -q libeccodes-dev
      - run: pip install numpy scipy pygrib rasterio shapely requests
      - env:
          SUPABASE_URL: https://aozjsfjemobuzqrhxcxy.supabase.co
          SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvempzZmplbW9idXpxcmh4Y3h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2NzMyODIsImV4cCI6MjEwMDI0OTI4Mn0.gYwwzMcT4VCuTyWHNXlm8viyeGOsv7isfNgegYAmcV8
          INGEST_SECRET: ${{ secrets.INGEST_SECRET_NEW }}
          TIME_BUDGET_MIN: ${{ github.event.inputs.time_budget_min || '100' }}
        run: python wind_bg_walker.py
