name: wind-ingest

on:
  schedule:
    - cron: "30 8 * * *"      # ~08:30 UTC daily; ingests yesterday + purges >2yr
  workflow_dispatch:
    inputs:
      date:
        description: "Date(s) YYYYMMDD, comma-separated. Blank = yesterday."
        required: false
      states:
        description: "Comma list of states. Blank = all permitted."
        required: false
      hours_step:
        description: "Hour stride for daily max (1=hourly/best, 3=faster backfill)."
        required: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: System deps
        run: sudo apt-get update && sudo apt-get install -y libeccodes-dev
      - name: Python deps
        run: pip install pygrib numpy scipy rasterio shapely requests
      - name: Run ingester
        env:
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          INGEST_SECRET:     ${{ secrets.INGEST_SECRET }}
          INGEST_DATE:       ${{ github.event.inputs.date }}
          STATES:            ${{ github.event.inputs.states }}
          HOURS_STEP:        ${{ github.event.inputs.hours_step }}
        run: python wind_ingest.py
