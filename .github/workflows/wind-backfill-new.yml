name: wind-backfill-newdb

# Timeout-proof: the walker saves progress after EVERY date and stops itself
# at ~100 minutes, well inside the 115-minute job limit. Runs every 3 hours
# until the 2-year window is complete, then exits in seconds each time.
# Disable this workflow (Actions tab) once the log says "Backfill COMPLETE".

on:
  schedule:
    - cron: "15 */3 * * *"
  workflow_dispatch:
    inputs:
      time_budget_min:
        description: "Minutes of work per run (default 100)."
        required: false

concurrency:
  group: newdb-wind-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 115
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: System deps
        run: sudo apt-get update && sudo apt-get install -y libeccodes-dev
      - name: Python deps
        run: pip install pygrib numpy scipy rasterio shapely requests
      - name: Walk dates until budget
        env:
          SUPABASE_URL:      https://aozjsfjemobuzqrhxcxy.supabase.co
          SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvempzZmplbW9idXpxcmh4Y3h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2NzMyODIsImV4cCI6MjEwMDI0OTI4Mn0.gYwwzMcT4VCuTyWHNXlm8viyeGOsv7isfNgegYAmcV8
          INGEST_SECRET:     ${{ secrets.INGEST_SECRET_NEW }}
          TIME_BUDGET_MIN:   ${{ github.event.inputs.time_budget_min }}
        run: python backfill_walker.py
